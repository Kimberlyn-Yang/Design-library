<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kimberlyn's Design Library</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F9F9F8; color: #1a1a1a; }

  nav { background: #fff; border-bottom: 0.5px solid #e5e5e5; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  nav .logo { font-size: 15px; font-weight: 600; color: #1a1a1a; }
  nav .logo span { color: #6366f1; }
  nav .links { display: flex; gap: 16px; align-items: center; }
  nav a { font-size: 13px; color: #666; text-decoration: none; padding: 6px 12px; border-radius: 6px; transition: background 0.15s; }
  nav a:hover { background: #f4f4f4; color: #1a1a1a; }
  nav .github-btn { background: #1a1a1a; color: #fff !important; border-radius: 6px; padding: 6px 14px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
  nav .github-btn:hover { background: #333 !important; }

  .hero { padding: 48px 32px 32px; max-width: 1100px; margin: 0 auto; }
  .hero h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
  .hero p { font-size: 15px; color: #666; margin-bottom: 24px; }

  .toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 32px; }
  .toolbar input { padding: 8px 14px; border: 0.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; width: 260px; background: #fff; outline: none; }
  .toolbar input:focus { border-color: #6366f1; }
  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 14px; border: 0.5px solid #e0e0e0; border-radius: 20px; font-size: 13px; background: #fff; cursor: pointer; transition: all 0.15s; color: #555; }
  .filter-btn:hover { border-color: #6366f1; color: #6366f1; }
  .filter-btn.active { background: #6366f1; color: #fff; border-color: #6366f1; }
  .add-btn { margin-left: auto; padding: 8px 18px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .add-btn:hover { background: #333; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; max-width: 1100px; margin: 0 auto; padding: 0 32px 48px; }

  .card { background: #fff; border: 0.5px solid #e5e5e5; border-radius: 12px; overflow: hidden; transition: box-shadow 0.2s, transform 0.2s; cursor: pointer; }
  .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); transform: translateY(-2px); }
  .card-img { width: 100%; height: 180px; object-fit: cover; background: #f0f0f0; display: flex; align-items: center; justify-content: center; color: #bbb; font-size: 13px; position: relative; overflow: hidden; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #aaa; }
  .card-body { padding: 16px; }
  .card-title { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
  .card-desc { font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .tag { padding: 3px 10px; border-radius: 20px; font-size: 12px; }
  .tag-scene { background: #EEF2FF; color: #4338ca; }
  .tag-style { background: #F0FDF4; color: #15803d; }
  .card-meta { display: flex; align-items: center; justify-content: space-between; }
  .rating { display: flex; gap: 2px; }
  .star { color: #f59e0b; font-size: 13px; }
  .star.empty { color: #e5e7eb; }
  .card-actions { display: flex; gap: 8px; }
  .action-btn { padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 0.5px solid #e0e0e0; background: #fff; color: #555; transition: all 0.15s; }
  .action-btn:hover { background: #f4f4f4; }
  .action-btn.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .action-btn.primary:hover { background: #333; }

  .empty-state { text-align: center; padding: 80px 32px; color: #aaa; max-width: 1100px; margin: 0 auto; }
  .empty-state p { font-size: 15px; margin-top: 8px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 28px; width: 560px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 9px 12px; border: 0.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; font-family: inherit; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #6366f1; }
  .form-group textarea { resize: vertical; min-height: 100px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel { padding: 8px 18px; border: 0.5px solid #e0e0e0; border-radius: 8px; background: #fff; cursor: pointer; font-size: 14px; }
  .btn-save { padding: 8px 18px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }

  .detail-modal { width: 720px; }
  .detail-img { width: 100%; height: 280px; background: #f4f4f4; border-radius: 8px; margin-bottom: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .detail-img img { width: 100%; height: 100%; object-fit: cover; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .detail-label { font-size: 12px; color: #999; margin-bottom: 4px; }
  .detail-value { font-size: 14px; color: #1a1a1a; }
  .prompt-box { background: #f9f9f8; border: 0.5px solid #e5e5e5; border-radius: 8px; padding: 14px; font-size: 13px; color: #444; line-height: 1.6; white-space: pre-wrap; font-family: 'SF Mono', monospace; max-height: 200px; overflow-y: auto; margin-bottom: 12px; }
  .copy-btn { padding: 7px 16px; background: #1a1a1a; color: #fff; border: none; border-radius: 7px; cursor: pointer; font-size: 13px; }
  .copy-btn:hover { background: #333; }
  .copied { background: #16a34a !important; }
</style>
</head>
<body>

<nav>
  <div class="logo">Kimberlyn's <span>Design Library</span></div>
  <div class="links">
    <a href="https://github.com/Kimberlyn-Yang" target="_blank" class="github-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      GitHub
    </a>
  </div>
</nav>

<div class="hero">
  <h1>Frontend Design Library</h1>
  <p>Collect, organize, and reuse your best UI prompts and designs.</p>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Search by name or keyword..." oninput="render()">
    <div class="filter-group" id="scene-filters">
      <span style="font-size:13px;color:#666;align-self:center;">Scene:</span>
    </div>
    <div class="filter-group" id="style-filters">
      <span style="font-size:13px;color:#666;align-self:center;">Style:</span>
    </div>
    <button class="add-btn" onclick="openAdd()">+ Add Entry</button>
  </div>
</div>

<div class="grid" id="grid"></div>
<div class="empty-state" id="empty" style="display:none">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 13h4"/></svg>
  <p>No entries yet. Add your first design!</p>
</div>

<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2 id="modal-title">Add design entry</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="f-title" placeholder="e.g. Dark particle login">
      </div>
      <div class="form-group">
        <label>Rating (1–5)</label>
        <select id="f-rating">
          <option value="5">★★★★★ 5</option>
          <option value="4">★★★★☆ 4</option>
          <option value="3">★★★☆☆ 3</option>
          <option value="2">★★☆☆☆ 2</option>
          <option value="1">★☆☆☆☆ 1</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <input type="text" id="f-desc" placeholder="One-line summary of this design">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Scene (use case)</label>
        <input type="text" id="f-scene" placeholder="e.g. Login page, Dashboard">
      </div>
      <div class="form-group">
        <label>Style</label>
        <input type="text" id="f-style" placeholder="e.g. Dark tech, Clean SaaS">
      </div>
    </div>
    <div class="form-group">
      <label>Reference website</label>
      <input type="text" id="f-ref" placeholder="https://synex.xyz">
    </div>
    <div class="form-group">
      <label>Screenshot URL (or leave blank)</label>
      <input type="text" id="f-img" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>Prompt</label>
      <textarea id="f-prompt" placeholder="Paste your full MeDo/Claude prompt here..."></textarea>
    </div>
    <div class="form-group">
      <label>GitHub file path (optional)</label>
      <input type="text" id="f-github" placeholder="e.g. login-pages/dark-particle/prompt.md">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEntry()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="detail-modal">
  <div class="modal detail-modal">
    <div class="detail-img" id="d-img"></div>
    <h2 id="d-title"></h2>
    <p id="d-desc" style="font-size:14px;color:#666;margin-bottom:16px;"></p>
    <div class="detail-grid">
      <div><div class="detail-label">Scene</div><div class="detail-value" id="d-scene"></div></div>
      <div><div class="detail-label">Style</div><div class="detail-value" id="d-style"></div></div>
      <div><div class="detail-label">Rating</div><div class="detail-value" id="d-rating"></div></div>
      <div><div class="detail-label">Reference</div><div class="detail-value" id="d-ref"></div></div>
    </div>
    <div class="detail-label" style="margin-bottom:8px;">Prompt</div>
    <div class="prompt-box" id="d-prompt"></div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <button class="copy-btn" id="copy-btn" onclick="copyPrompt()">Copy prompt</button>
      <button class="copy-btn" id="d-github-btn" style="background:#24292f;display:none" onclick="openGithub()">View on GitHub</button>
      <button class="action-btn" onclick="deleteEntry()" style="margin-left:auto;color:#dc2626;border-color:#fecaca;">Delete</button>
      <button class="action-btn" onclick="closeDetail()">Close</button>
    </div>
  </div>
</div>

<script>
const GITHUB_BASE = 'https://github.com/Kimberlyn-Yang';
let entries = JSON.parse(localStorage.getItem('design-library') || '[]');
let activeScenes = new Set();
let activeStyles = new Set();
let currentId = null;
let editingId = null;

function save() { localStorage.setItem('design-library', JSON.stringify(entries)); }

function allScenes() { return [...new Set(entries.map(e => e.scene).filter(Boolean))]; }
function allStyles() { return [...new Set(entries.map(e => e.style).filter(Boolean))]; }

function buildFilters() {
  const sf = document.getElementById('scene-filters');
  const stf = document.getElementById('style-filters');
  const scenes = allScenes();
  const styles = allStyles();
  sf.innerHTML = '<span style="font-size:13px;color:#666;align-self:center;">Scene:</span>';
  stf.innerHTML = '<span style="font-size:13px;color:#666;align-self:center;">Style:</span>';
  if (!scenes.length && !styles.length) return;
  scenes.forEach(s => {
    const b = document.createElement('button');
    b.className = 'filter-btn' + (activeScenes.has(s) ? ' active' : '');
    b.textContent = s;
    b.onclick = () => { activeScenes.has(s) ? activeScenes.delete(s) : activeScenes.add(s); render(); };
    sf.appendChild(b);
  });
  styles.forEach(s => {
    const b = document.createElement('button');
    b.className = 'filter-btn' + (activeStyles.has(s) ? ' active' : '');
    b.textContent = s;
    b.onclick = () => { activeStyles.has(s) ? activeStyles.delete(s) : activeStyles.add(s); render(); };
    stf.appendChild(b);
  });
}

function stars(n) {
  return Array.from({length:5}, (_,i) => `<span class="star${i<n?'':' empty'}">★</span>`).join('');
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  let filtered = entries.filter(e => {
    const matchQ = !q || [e.title,e.desc,e.scene,e.style,e.prompt].join(' ').toLowerCase().includes(q);
    const matchScene = !activeScenes.size || activeScenes.has(e.scene);
    const matchStyle = !activeStyles.size || activeStyles.has(e.style);
    return matchQ && matchScene && matchStyle;
  });
  buildFilters();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if (!filtered.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = filtered.map(e => `
    <div class="card" onclick="openDetail('${e.id}')">
      <div class="card-img">
        ${e.img ? `<img src="${e.img}" alt="${e.title}" onerror="this.style.display='none'">` : `<div class="card-img-placeholder">No screenshot</div>`}
      </div>
      <div class="card-body">
        <div class="card-title">${e.title}</div>
        <div class="card-desc">${e.desc || 'No description'}</div>
        <div class="card-tags">
          ${e.scene ? `<span class="tag tag-scene">${e.scene}</span>` : ''}
          ${e.style ? `<span class="tag tag-style">${e.style}</span>` : ''}
        </div>
        <div class="card-meta">
          <div class="rating">${stars(e.rating||0)}</div>
          <div class="card-actions">
            <button class="action-btn" onclick="event.stopPropagation();openEdit('${e.id}')">Edit</button>
            <button class="action-btn primary" onclick="event.stopPropagation();openDetail('${e.id}')">View</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function openAdd() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add design entry';
  ['title','desc','scene','style','ref','img','prompt','github'].forEach(f => document.getElementById('f-'+f).value = '');
  document.getElementById('f-rating').value = '5';
  document.getElementById('add-modal').classList.add('open');
}

function openEdit(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit entry';
  document.getElementById('f-title').value = e.title || '';
  document.getElementById('f-desc').value = e.desc || '';
  document.getElementById('f-scene').value = e.scene || '';
  document.getElementById('f-style').value = e.style || '';
  document.getElementById('f-ref').value = e.ref || '';
  document.getElementById('f-img').value = e.img || '';
  document.getElementById('f-prompt').value = e.prompt || '';
  document.getElementById('f-github').value = e.github || '';
  document.getElementById('f-rating').value = e.rating || 5;
  document.getElementById('add-modal').classList.add('open');
}

function closeModal() { document.getElementById('add-modal').classList.remove('open'); }

function saveEntry() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Please enter a title.'); return; }
  const entry = {
    id: editingId || Date.now().toString(),
    title,
    desc: document.getElementById('f-desc').value.trim(),
    scene: document.getElementById('f-scene').value.trim(),
    style: document.getElementById('f-style').value.trim(),
    ref: document.getElementById('f-ref').value.trim(),
    img: document.getElementById('f-img').value.trim(),
    prompt: document.getElementById('f-prompt').value.trim(),
    github: document.getElementById('f-github').value.trim(),
    rating: parseInt(document.getElementById('f-rating').value),
    createdAt: editingId ? (entries.find(e=>e.id===editingId)?.createdAt || Date.now()) : Date.now()
  };
  if (editingId) { entries = entries.map(e => e.id === editingId ? entry : e); }
  else { entries.unshift(entry); }
  save(); closeModal(); render();
}

function openDetail(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  currentId = id;
  document.getElementById('d-title').textContent = e.title;
  document.getElementById('d-desc').textContent = e.desc || '';
  document.getElementById('d-scene').textContent = e.scene || '—';
  document.getElementById('d-style').textContent = e.style || '—';
  document.getElementById('d-rating').innerHTML = stars(e.rating||0);
  document.getElementById('d-ref').innerHTML = e.ref ? `<a href="${e.ref}" target="_blank" style="color:#6366f1">${e.ref}</a>` : '—';
  document.getElementById('d-prompt').textContent = e.prompt || 'No prompt saved.';
  const imgEl = document.getElementById('d-img');
  imgEl.innerHTML = e.img ? `<img src="${e.img}" alt="${e.title}">` : `<span style="color:#bbb;font-size:14px">No screenshot</span>`;
  const ghBtn = document.getElementById('d-github-btn');
  ghBtn.style.display = e.github ? 'inline-block' : 'none';
  document.getElementById('copy-btn').textContent = 'Copy prompt';
  document.getElementById('copy-btn').classList.remove('copied');
  document.getElementById('detail-modal').classList.add('open');
}

function closeDetail() { document.getElementById('detail-modal').classList.remove('open'); currentId = null; }

function copyPrompt() {
  const e = entries.find(x => x.id === currentId);
  if (!e) return;
  navigator.clipboard.writeText(e.prompt || '').then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy prompt'; btn.classList.remove('copied'); }, 2000);
  });
}

function openGithub() {
  const e = entries.find(x => x.id === currentId);
  if (e?.github) window.open(`${GITHUB_BASE}/design-library/blob/main/${e.github}`, '_blank');
}

function deleteEntry() {
  if (!currentId) return;
  if (!confirm('Delete this entry?')) return;
  entries = entries.filter(e => e.id !== currentId);
  save(); closeDetail(); render();
}

document.getElementById('add-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('detail-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });

if (!entries.length) {
  entries = [{
    id: '1',
    title: 'KOCBridge login landing page',
    desc: 'Cinematic SaaS landing page inspired by Synex.xyz — editorial typography, floating glassmorphism cards, scroll animations.',
    scene: 'Login page',
    style: 'Clean SaaS',
    ref: 'https://synex.xyz',
    img: '',
    prompt: 'Completely redesign the login page into a stunning long-scroll landing page with login form, inspired by premium Chinese SaaS product pages. Light blue and white color scheme, 3D illustrations, glassmorphism cards, smooth scrolling.',
    github: 'login-pages/synex-style/prompt.md',
    rating: 5,
    createdAt: Date.now()
  },{
    id: '2',
    title: 'Dark particle login',
    desc: 'Full-screen particle system background with glassmorphism login card. Cinematic space-tech aesthetic.',
    scene: 'Login page',
    style: 'Dark tech',
    ref: '',
    img: '',
    prompt: 'Redesign the login page to match a dark, premium, space-tech aesthetic. Full dark background (#050810), animated particle system with blue/cyan glowing dots and connection lines, mouse interaction. Glassmorphism login card centered.',
    github: 'login-pages/dark-particle/prompt.md',
    rating: 4,
    createdAt: Date.now() - 1000
  }];
  save();
}

render();
</script>
</body>
</html>
